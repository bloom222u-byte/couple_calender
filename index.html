<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OurDays v1.9</title>
  <link rel="stylesheet" href="./style.css?v=1.9" />

  <meta name="theme-color" content="#ff4f8b" />
  <link rel="manifest" href="./manifest.json?v=1.9" />
  <link rel="icon" type="image/png" sizes="32x32" href="./favicon-32.png?v=1.9" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png?v=1.9" />

</head>
<body>

  <div id="splashScreen" class="splash-screen">
    <img src="./icon-512.png" alt="OurDays" />
    <div class="splash-title">OurDays</div>
  </div>

  <div class="app">
    <section class="hero">
      <div class="title-card">
        <h1>💘 OurDays <span id="loveDays" class="title-dplus">--</span></h1>
      </div>

      <div class="stats-card">
        <div class="stat">
          <span>우리 만난 날</span>
          <strong id="totalDateCount">--일</strong>
        </div>
        <div class="stat">
          <span>이번 달 만난 날</span>
          <strong id="monthlyDateCount">--일</strong>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="calendar-card">
        <div class="calendar-head">
          <h2 id="monthTitle">--</h2>
          <div class="nav-buttons">
            <button id="prevMonthBtn">‹</button>
            <button id="todayBtn">●</button>
            <button id="nextMonthBtn">›</button>
          </div>
        </div>

        <div class="weekday">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>

        <div class="calendar" id="calendar"></div>
      </div>

      <aside class="side">
        <div class="form-card">
          <h3>➕ 일정 입력</h3>

          <label for="eventDate">날짜</label>
          <input type="date" id="eventDate" />

          <label for="eventType">구분</label>
          <select id="eventType">
            <option value="boyfriend">남친 일정</option>
            <option value="girlfriend">여친 일정</option>
            <option value="date">데이트 일정</option>
          </select>

          <label for="eventTitle">일정 제목</label>
          <input type="text" id="eventTitle" placeholder="예: 성수 데이트, 야근, 친구 약속" />

          <label for="eventMemo">메모</label>
          <textarea id="eventMemo" placeholder="장소, 준비물, 하고 싶은 말 등을 적어보세요."></textarea>

          <button class="save-btn" id="addEventBtn">달력에 추가하기</button>
        </div>

        <div class="memory-card">
          <h3>📷 추억 사진 올리기</h3>

          <label for="photoDate">사진 날짜</label>
          <input type="date" id="photoDate" />

          <label for="photoFiles">사진 선택</label>
          <input type="file" id="photoFiles" accept="image/*" multiple />

          <label for="photoCaption">사진 메모</label>
          <input type="text" id="photoCaption" placeholder="예: 한강 산책, 첫 여행, 비 오는 날 카페" />

          <div class="preview" id="photoPreview"></div>

          <button class="photo-btn" id="addPhotosBtn">사진 저장하기</button>
        </div>

        <div class="list-card">
          <h3>📌 이번 달 입력 일정</h3>
          <div id="eventList"></div>
        </div>

        <div class="list-card">
          <h3>🖼️ 이번 달 사진</h3>
          <div id="photoList"></div>
        </div>
      </aside>
    </section>
  </div>

  <div class="modal" id="dayModal">
    <div class="modal-content">
      <div class="modal-head">
        <h3 id="modalTitle">날짜 상세</h3>
        <button class="close-btn" id="closeModalBtn">×</button>
      </div>
      <div id="modalBody"></div>

      <div class="quick-add-card">
        <h4>➕ 이 날짜에 일정 추가</h4>
        <label for="modalEventType">구분</label>
        <select id="modalEventType">
          <option value="boyfriend">남친 일정</option>
          <option value="girlfriend">여친 일정</option>
          <option value="date">데이트 일정</option>
        </select>
        <label for="modalEventTitle">일정 제목</label>
        <input type="text" id="modalEventTitle" placeholder="예: 저녁 데이트, 야근, 친구 약속" />
        <label for="modalEventMemo">메모</label>
        <textarea id="modalEventMemo" placeholder="장소나 준비물을 적어보세요."></textarea>
        <button class="save-btn" id="modalAddEventBtn">이 날짜에 추가하기</button>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js?v=1.9"></script>

  <script>
    window.addEventListener("load", () => {
      const splash = document.getElementById("splashScreen");
      if (!splash) return;
      setTimeout(() => splash.classList.add("hide"), 800);
      setTimeout(() => splash.remove(), 1350);
    });
  </script>

</body>
</html>
