<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 데이트 달력 & 추억 앨범</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 173, 200, 0.58), transparent 30%),
        radial-gradient(circle at bottom right, rgba(186, 220, 255, 0.7), transparent 30%),
        linear-gradient(135deg, #fff7fb, #f3f8ff);
      color: #2d2d2d;
      padding: 24px;
    }

    .app { max-width: 1220px; margin: 0 auto; }

    .hero {
      display: grid;
      grid-template-columns: 1.4fr 0.8fr;
      gap: 16px;
      margin-bottom: 18px;
    }

    .title-card, .stats-card, .calendar-card, .form-card, .list-card, .memory-card {
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 28px;
      box-shadow: 0 16px 50px rgba(255, 94, 150, 0.14);
      backdrop-filter: blur(14px);
    }

    .title-card { padding: 26px; }

    .title-card h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: -1px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .title-dplus {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      background: #ffe3ee;
      color: #ff4f8b;
      font-size: 15px;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .title-card p {
      margin: 0;
      color: #666;
      line-height: 1.6;
    }

    .stats-card {
      padding: 18px;
      display: grid;
      gap: 10px;
      align-content: center;
    }

    .stat {
      padding: 14px 16px;
      border-radius: 20px;
      background: #fff;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
    }

    .stat span { color: #777; font-size: 14px; }
    .stat strong { font-size: 18px; color: #ff4f8b; }

    .layout {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 18px;
    }

    .calendar-card { padding: 22px; }

    .calendar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      gap: 12px;
    }

    .calendar-head h2 { margin: 0; font-size: 26px; }

    .nav-buttons { display: flex; gap: 8px; }

    button {
      border: none;
      cursor: pointer;
      font-weight: 800;
      border-radius: 14px;
      transition: 0.15s;
    }

    .nav-buttons button {
      width: 44px;
      height: 40px;
      background: #ffe3ee;
      color: #ff4f8b;
      font-size: 20px;
    }

    .nav-buttons button:hover { background: #ffd1e2; }

    .weekday {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 8px;
      color: #777;
      font-weight: 800;
      text-align: center;
      font-size: 14px;
    }

    .weekday div:first-child { color: #ff477e; }
    .weekday div:last-child { color: #3b82f6; }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .day {
      min-height: 150px;
      padding: 10px;
      border-radius: 18px;
      background: #ffffff;
      border: 1px solid #f1f1f1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .day.has-photo {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .day.has-photo::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.08),
        rgba(0,0,0,0.12) 45%,
        rgba(0,0,0,0.48)
      );
      z-index: 1;
    }

    .day:hover { box-shadow: 0 8px 20px rgba(255, 79, 139, 0.12); }

    .day.muted {
      opacity: 0.38;
      background: #fafafa;
    }

    .day.today { outline: 3px solid #ff7aaa; }

    .day .num {
      font-weight: 900;
      font-size: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      position: relative;
      z-index: 2;
      background: rgba(255,255,255,0.85);
    }

    .today .num { background: #ff4f8b; color: white; }

    .photo-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
      margin-top: 7px;
      margin-bottom: 6px;
    }

    .photo-thumb {
      height: 40px;
      border-radius: 9px;
      overflow: hidden;
      background: #f3f4f6;
      position: relative;
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .more-photos {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 900;
    }

    .tag {
      margin-top: 5px;
      padding: 4px 7px;
      border-radius: 999px;
      font-size: 11px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      position: relative;
      z-index: 2;
    }

    .photo-count {
      position: absolute;
      right: 8px;
      bottom: 8px;
      z-index: 3;
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(0,0,0,0.55);
      color: white;
      font-size: 12px;
      font-weight: 900;
    }

    .tag.holiday { background: #ffe4e9; color: #e11d48; }
    .tag.term { background: #e7f7ec; color: #15803d; }
    .tag.boyfriend { background: #dbeafe; color: #1d4ed8; }
    .tag.girlfriend { background: #fce7f3; color: #be185d; }
    .tag.date { background: #fff1c7; color: #a16207; }

    .side { display: grid; gap: 18px; }

    .form-card, .list-card, .memory-card { padding: 20px; }

    .form-card h3, .list-card h3, .memory-card h3 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #666;
      margin: 12px 0 6px;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid #eee;
      border-radius: 14px;
      padding: 12px;
      font-size: 15px;
      background: white;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 68px;
    }

    .save-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: #ff4f8b;
      color: white;
      font-size: 16px;
    }

    .save-btn:hover { background: #eb3475; }

    .photo-btn {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      background: #7c3aed;
      color: white;
      font-size: 16px;
    }

    .photo-btn:hover { background: #6d28d9; }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .legend span {
      font-size: 12px;
      padding: 6px 9px;
      border-radius: 999px;
      background: white;
    }

    .event-item, .photo-item {
      padding: 12px;
      border-radius: 16px;
      background: white;
      margin-bottom: 10px;
      border: 1px solid #f1f1f1;
    }

    .event-item strong, .photo-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .event-meta {
      font-size: 12px;
      color: #777;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .delete-btn {
      padding: 7px 10px;
      background: #f3f4f6;
      color: #555;
      font-size: 12px;
      margin-top: 6px;
    }

    .delete-btn:hover {
      background: #fee2e2;
      color: #b91c1c;
    }

    .empty {
      color: #888;
      font-size: 14px;
      line-height: 1.6;
    }

    .preview {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .preview img {
      width: 100%;
      height: 70px;
      border-radius: 12px;
      object-fit: cover;
    }

    .memory-gallery {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
      margin-top: 8px;
    }

    .memory-gallery img {
      width: 100%;
      height: 64px;
      border-radius: 12px;
      object-fit: cover;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 20px;
    }

    .modal.open { display: flex; }

    .modal-content {
      width: min(760px, 94vw);
      max-height: 86vh;
      overflow: auto;
      border-radius: 28px;
      background: white;
      padding: 24px;
      box-shadow: 0 20px 80px rgba(0,0,0,0.25);
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .modal-head h3 {
      margin: 0;
      font-size: 24px;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      background: #f3f4f6;
      color: #555;
      font-size: 18px;
    }

    .modal-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 10px;
    }

    .modal-photo {
      border-radius: 18px;
      overflow: hidden;
      background: #f8fafc;
      border: 1px solid #f1f1f1;
    }

    .modal-photo img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .modal-photo div {
      padding: 10px;
      font-size: 13px;
      color: #555;
    }

    @media (max-width: 960px) {
      body { padding: 14px; }
      .hero, .layout { grid-template-columns: 1fr; }
      .day { min-height: 126px; padding: 8px; }
      .title-card h1 { font-size: 28px; }
    }

    @media (max-width: 560px) {
      .calendar, .weekday { gap: 5px; }
      .weekday { font-size: 12px; }
      .day { min-height: 112px; border-radius: 14px; }
      .tag { font-size: 10px; padding: 3px 5px; }
      .photo-thumb { height: 34px; }
      .modal-gallery { grid-template-columns: 1fr; }
      .modal-photo img { height: 240px; }
    }
  
    /* Mobile-first comfort overrides */
    @media (max-width: 760px) {
      body {
        padding: 10px;
        background:
          radial-gradient(circle at top left, rgba(255, 173, 200, 0.55), transparent 34%),
          linear-gradient(180deg, #fff7fb, #f5f9ff);
      }

      .app {
        max-width: 100%;
      }

      .hero {
        display: block;
        margin-bottom: 12px;
      }

      .title-card {
        padding: 18px;
        border-radius: 24px;
        margin-bottom: 10px;
      }

      .title-card h1 {
        font-size: 24px;
        line-height: 1.25;
        margin-bottom: 8px;
      }

      .title-dplus {
        font-size: 13px;
        padding: 4px 9px;
      }

      .title-card p {
        font-size: 13px;
        line-height: 1.5;
      }

      .legend {
        gap: 6px;
        margin-top: 12px;
      }

      .legend span {
        font-size: 11px;
        padding: 5px 8px;
      }

      .stats-card {
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        padding: 0;
        background: transparent;
        box-shadow: none;
        border: none;
        backdrop-filter: none;
      }

      .stat {
        padding: 12px;
        border-radius: 18px;
        box-shadow: 0 8px 22px rgba(255, 94, 150, 0.10);
      }

      .stat span {
        display: block;
        font-size: 12px;
      }

      .stat strong {
        font-size: 17px;
      }

      .layout {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .calendar-card {
        padding: 14px;
        border-radius: 24px;
      }

      .calendar-head {
        margin-bottom: 12px;
      }

      .calendar-head h2 {
        font-size: 22px;
      }

      .nav-buttons button {
        width: 40px;
        height: 38px;
        border-radius: 13px;
      }

      .weekday {
        gap: 4px;
        margin-bottom: 6px;
        font-size: 11px;
      }

      .calendar {
        gap: 4px;
      }

      .day {
        min-height: 92px;
        padding: 5px;
        border-radius: 13px;
      }

      .day .num {
        width: 23px;
        height: 23px;
        font-size: 12px;
      }

      .day.has-photo::before {
        background: linear-gradient(
          to bottom,
          rgba(0,0,0,0.05),
          rgba(0,0,0,0.18) 45%,
          rgba(0,0,0,0.60)
        );
      }

      .tag {
        margin-top: 3px;
        padding: 3px 5px;
        font-size: 9.5px;
        max-width: 100%;
      }

      .photo-count {
        right: 5px;
        bottom: 5px;
        font-size: 10px;
        padding: 3px 6px;
      }

      .side {
        gap: 12px;
      }

      .form-card,
      .memory-card,
      .list-card {
        padding: 16px;
        border-radius: 24px;
      }

      .form-card h3,
      .memory-card h3,
      .list-card h3 {
        font-size: 18px;
        margin-bottom: 10px;
      }

      label {
        font-size: 12px;
        margin: 10px 0 5px;
      }

      input,
      select,
      textarea {
        font-size: 16px;
        padding: 12px;
        border-radius: 14px;
      }

      textarea {
        min-height: 60px;
      }

      .save-btn,
      .photo-btn {
        min-height: 48px;
        font-size: 15px;
        border-radius: 15px;
      }

      .event-item,
      .photo-item {
        padding: 11px;
        border-radius: 15px;
      }

      .memory-gallery {
        grid-template-columns: repeat(4, 1fr);
      }

      .memory-gallery img {
        height: 58px;
      }

      .preview img {
        height: 62px;
      }

      .modal {
        padding: 10px;
        align-items: flex-end;
      }

      .modal-content {
        width: 100%;
        max-height: 88vh;
        border-radius: 26px 26px 0 0;
        padding: 18px;
      }

      .modal-head h3 {
        font-size: 20px;
      }

      .modal-gallery {
        grid-template-columns: 1fr;
      }

      .modal-photo img {
        height: 260px;
      }
    }

    @media (max-width: 390px) {
      .day {
        min-height: 82px;
        padding: 4px;
        border-radius: 11px;
      }

      .calendar,
      .weekday {
        gap: 3px;
      }

      .tag {
        font-size: 8.5px;
        padding: 2px 4px;
      }

      .calendar-head h2 {
        font-size: 20px;
      }

      .title-card h1 {
        font-size: 22px;
      }
    }

  </style>
</head>
<body>
  <div class="app">
    <section class="hero">
      <div class="title-card">
        <h1>💘 우리 데이트 달력 <span id="loveDays" class="title-dplus">--</span></h1>
        <p>일정과 사진을 날짜별로 모아보는 커플 캘린더입니다.</p>
        <div class="legend">
          <span>💙 남친 일정</span>
          <span>💗 여친 일정</span>
          <span>💛 데이트</span>
          <span>📷 추억 사진</span>
          <span>❤️ 공휴일</span>
          <span>🌿 24절기</span>
        </div>
      </div>

      <div class="stats-card">
        <div class="stat">
          <span>이번 주 만난 날</span>
          <strong id="weeklyDateCount">--일</strong>
        </div>
        <div class="stat">
          <span>이번 달 추억 사진</span>
          <strong id="monthlyPhotoCount">--장</strong>
        </div>
      </div>
    </section>

    <section class="layout">
      <div class="calendar-card">
        <div class="calendar-head">
          <h2 id="monthTitle">--</h2>
          <div class="nav-buttons">
            <button onclick="moveMonth(-1)">‹</button>
            <button onclick="goToday()">●</button>
            <button onclick="moveMonth(1)">›</button>
          </div>
        </div>

        <div class="weekday">
          <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>

        <div class="calendar" id="calendar"></div>
      </div>

      <aside class="side">
        <div class="form-card">
          <h3>➕ 일정 입력</h3>

          <label for="eventDate">날짜</label>
          <input type="date" id="eventDate" />

          <label for="eventType">구분</label>
          <select id="eventType">
            <option value="boyfriend">남친 일정</option>
            <option value="girlfriend">여친 일정</option>
            <option value="date">데이트 일정</option>
          </select>

          <label for="eventTitle">일정 제목</label>
          <input type="text" id="eventTitle" placeholder="예: 성수 데이트, 야근, 친구 약속" />

          <label for="eventMemo">메모</label>
          <textarea id="eventMemo" placeholder="장소, 준비물, 하고 싶은 말 등을 적어보세요."></textarea>

          <button class="save-btn" onclick="addEvent()">달력에 추가하기</button>
        </div>

        <div class="memory-card">
          <h3>📷 추억 사진 올리기</h3>

          <label for="photoDate">사진 날짜</label>
          <input type="date" id="photoDate" />

          <label for="photoFiles">사진 선택</label>
          <input type="file" id="photoFiles" accept="image/*" multiple onchange="previewPhotos()" />

          <label for="photoCaption">사진 메모</label>
          <input type="text" id="photoCaption" placeholder="예: 한강 산책, 첫 여행, 비 오는 날 카페" />

          <div class="preview" id="photoPreview"></div>

          <button class="photo-btn" onclick="addPhotos()">사진 저장하기</button>
        </div>

        <div class="list-card">
          <h3>📌 이번 달 입력 일정</h3>
          <div id="eventList"></div>
        </div>

        <div class="list-card">
          <h3>🖼️ 이번 달 사진</h3>
          <div id="photoList"></div>
        </div>
      </aside>
    </section>
  </div>

  <div class="modal" id="dayModal">
    <div class="modal-content">
      <div class="modal-head">
        <h3 id="modalTitle">날짜 상세</h3>
        <button class="close-btn" onclick="closeModal()">×</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

  <script>
    const calendarEl = document.getElementById("calendar");
    const monthTitleEl = document.getElementById("monthTitle");
    const loveDaysEl = document.getElementById("loveDays");
    const weeklyDateCountEl = document.getElementById("weeklyDateCount");
    const monthlyPhotoCountEl = document.getElementById("monthlyPhotoCount");
    const eventListEl = document.getElementById("eventList");
    const photoListEl = document.getElementById("photoList");
    const photoPreviewEl = document.getElementById("photoPreview");

    const startDate = new Date(2026, 4, 18);
    const now = new Date();

    let currentYear = now.getFullYear();
    let currentMonth = now.getMonth();

    let events = JSON.parse(localStorage.getItem("coupleCalendarEvents") || "[]");
    let photos = JSON.parse(localStorage.getItem("coupleCalendarPhotos") || "[]");

    const holidays = {
      "2026-01-01": "신정", "2026-02-16": "설날 연휴", "2026-02-17": "설날", "2026-02-18": "설날 연휴",
      "2026-03-01": "삼일절", "2026-03-02": "대체공휴일", "2026-05-05": "어린이날", "2026-05-24": "부처님오신날",
      "2026-05-25": "대체공휴일", "2026-06-06": "현충일", "2026-08-15": "광복절", "2026-08-17": "대체공휴일",
      "2026-09-24": "추석 연휴", "2026-09-25": "추석", "2026-09-26": "추석 연휴",
      "2026-10-03": "개천절", "2026-10-05": "대체공휴일", "2026-10-09": "한글날", "2026-12-25": "성탄절",
      "2027-01-01": "신정", "2027-02-06": "설날 연휴", "2027-02-07": "설날", "2027-02-08": "설날 연휴",
      "2027-03-01": "삼일절", "2027-05-05": "어린이날", "2027-05-13": "부처님오신날", "2027-06-06": "현충일",
      "2027-08-15": "광복절", "2027-09-14": "추석 연휴", "2027-09-15": "추석", "2027-09-16": "추석 연휴",
      "2027-10-03": "개천절", "2027-10-09": "한글날", "2027-12-25": "성탄절"
    };

    const solarTerms = [
      { month: 1, day: 5, name: "소한" }, { month: 1, day: 20, name: "대한" },
      { month: 2, day: 4, name: "입춘" }, { month: 2, day: 19, name: "우수" },
      { month: 3, day: 5, name: "경칩" }, { month: 3, day: 20, name: "춘분" },
      { month: 4, day: 4, name: "청명" }, { month: 4, day: 20, name: "곡우" },
      { month: 5, day: 5, name: "입하" }, { month: 5, day: 21, name: "소만" },
      { month: 6, day: 5, name: "망종" }, { month: 6, day: 21, name: "하지" },
      { month: 7, day: 7, name: "소서" }, { month: 7, day: 22, name: "대서" },
      { month: 8, day: 7, name: "입추" }, { month: 8, day: 23, name: "처서" },
      { month: 9, day: 7, name: "백로" }, { month: 9, day: 23, name: "추분" },
      { month: 10, day: 8, name: "한로" }, { month: 10, day: 23, name: "상강" },
      { month: 11, day: 7, name: "입동" }, { month: 11, day: 22, name: "소설" },
      { month: 12, day: 7, name: "대설" }, { month: 12, day: 21, name: "동지" }
    ];

    const typeLabel = {
      boyfriend: "💙 남친",
      girlfriend: "💗 여친",
      date: "💛 데이트"
    };

    const typeEmoji = {
      boyfriend: "💙",
      girlfriend: "💗",
      date: "💛"
    };

    function pad(num) { return String(num).padStart(2, "0"); }

    function toDateKey(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function dateKeyFromParts(year, monthIndex, day) {
      return `${year}-${pad(monthIndex + 1)}-${pad(day)}`;
    }

    function saveEvents() {
      localStorage.setItem("coupleCalendarEvents", JSON.stringify(events));
    }

    function savePhotos() {
      try {
        localStorage.setItem("coupleCalendarPhotos", JSON.stringify(photos));
      } catch (e) {
        alert("사진 용량이 너무 큽니다. 더 작은 사진을 선택하거나 일부 사진을 삭제해주세요.");
      }
    }

    function renderStats() {
      const today = new Date();
      const todayOnly = new Date(today.getFullYear(), today.getMonth(), today.getDate());
      const diff = Math.floor((todayOnly - startDate) / (1000 * 60 * 60 * 24)) + 1;
      loveDaysEl.textContent = diff > 0 ? `D+${diff}` : `D-${Math.abs(diff) + 1}`;

      const day = today.getDay();
      const weekStart = new Date(today.getFullYear(), today.getMonth(), today.getDate() - day);
      const weekEnd = new Date(today.getFullYear(), today.getMonth(), today.getDate() + (6 - day));

      const uniqueDateDates = new Set(
        events
          .filter(e => e.type === "date")
          .filter(e => {
            const d = new Date(e.date + "T00:00:00");
            return d >= weekStart && d <= weekEnd;
          })
          .map(e => e.date)
      );

      weeklyDateCountEl.textContent = `${uniqueDateDates.size}일`;

      const monthPhotos = photos.filter(p => {
        const d = new Date(p.date + "T00:00:00");
        return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
      });

      monthlyPhotoCountEl.textContent = `${monthPhotos.length}장`;
    }

    function renderCalendar() {
      calendarEl.innerHTML = "";
      monthTitleEl.textContent = `${currentYear}년 ${currentMonth + 1}월`;

      const firstDay = new Date(currentYear, currentMonth, 1);
      const lastDay = new Date(currentYear, currentMonth + 1, 0);
      const startWeekday = firstDay.getDay();
      const daysInMonth = lastDay.getDate();
      const prevLastDay = new Date(currentYear, currentMonth, 0).getDate();
      const totalCells = Math.ceil((startWeekday + daysInMonth) / 7) * 7;

      for (let i = 0; i < totalCells; i++) {
        const cell = document.createElement("div");
        cell.className = "day";

        let dayNum, cellYear = currentYear, cellMonth = currentMonth, muted = false;

        if (i < startWeekday) {
          dayNum = prevLastDay - startWeekday + i + 1;
          cellMonth = currentMonth - 1;
          if (cellMonth < 0) { cellMonth = 11; cellYear--; }
          muted = true;
        } else if (i >= startWeekday + daysInMonth) {
          dayNum = i - (startWeekday + daysInMonth) + 1;
          cellMonth = currentMonth + 1;
          if (cellMonth > 11) { cellMonth = 0; cellYear++; }
          muted = true;
        } else {
          dayNum = i - startWeekday + 1;
        }

        const key = dateKeyFromParts(cellYear, cellMonth, dayNum);
        if (muted) cell.classList.add("muted");
        if (key === toDateKey(new Date())) cell.classList.add("today");

        cell.onclick = () => openDayDetail(key);

        const num = document.createElement("div");
        num.className = "num";
        num.textContent = dayNum;
        cell.appendChild(num);

        const dayPhotos = photos.filter(p => p.date === key);
        if (dayPhotos.length > 0) {
          cell.classList.add("has-photo");
          cell.style.backgroundImage = `url("${dayPhotos[0].image}")`;

          if (dayPhotos.length > 1) {
            const count = document.createElement("div");
            count.className = "photo-count";
            count.textContent = `📷 +${dayPhotos.length - 1}`;
            cell.appendChild(count);
          } else {
            const count = document.createElement("div");
            count.className = "photo-count";
            count.textContent = "📷";
            cell.appendChild(count);
          }
        }

        if (holidays[key]) cell.appendChild(makeTag("holiday", `❤️ ${holidays[key]}`));

        solarTerms
          .filter(t => t.month === cellMonth + 1 && t.day === dayNum)
          .forEach(t => cell.appendChild(makeTag("term", `🌿 ${t.name}`)));

        events
          .filter(e => e.date === key)
          .forEach(e => cell.appendChild(makeTag(e.type, `${typeEmoji[e.type]} ${e.title}`)));

        calendarEl.appendChild(cell);
      }

      renderEventList();
      renderPhotoList();
      renderStats();
    }

    function makeTag(className, text) {
      const tag = document.createElement("div");
      tag.className = `tag ${className}`;
      tag.textContent = text;
      tag.title = text;
      return tag;
    }

    function addEvent() {
      const date = document.getElementById("eventDate").value;
      const type = document.getElementById("eventType").value;
      const title = document.getElementById("eventTitle").value.trim();
      const memo = document.getElementById("eventMemo").value.trim();

      if (!date) { alert("날짜를 선택해주세요."); return; }
      if (!title) { alert("일정 제목을 입력해주세요."); return; }

      events.push({ id: Date.now(), date, type, title, memo });
      saveEvents();

      const selected = new Date(date + "T00:00:00");
      currentYear = selected.getFullYear();
      currentMonth = selected.getMonth();

      document.getElementById("eventTitle").value = "";
      document.getElementById("eventMemo").value = "";

      renderCalendar();
    }

    function deleteEvent(id) {
      events = events.filter(e => e.id !== id);
      saveEvents();
      renderCalendar();
    }

    function previewPhotos() {
      const files = Array.from(document.getElementById("photoFiles").files);
      photoPreviewEl.innerHTML = "";

      files.slice(0, 6).forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = document.createElement("img");
          img.src = e.target.result;
          photoPreviewEl.appendChild(img);
        };
        reader.readAsDataURL(file);
      });
    }

    function addPhotos() {
      const date = document.getElementById("photoDate").value;
      const files = Array.from(document.getElementById("photoFiles").files);
      const caption = document.getElementById("photoCaption").value.trim();

      if (!date) { alert("사진 날짜를 선택해주세요."); return; }
      if (files.length === 0) { alert("사진을 선택해주세요."); return; }

      let completed = 0;

      files.forEach(file => {
        if (!file.type.startsWith("image/")) return;

        const reader = new FileReader();
        reader.onload = e => {
          photos.push({
            id: Date.now() + Math.random(),
            date,
            caption,
            image: e.target.result
          });

          completed++;

          if (completed === files.length) {
            savePhotos();

            const selected = new Date(date + "T00:00:00");
            currentYear = selected.getFullYear();
            currentMonth = selected.getMonth();

            document.getElementById("photoFiles").value = "";
            document.getElementById("photoCaption").value = "";
            photoPreviewEl.innerHTML = "";

            renderCalendar();
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function deletePhoto(id) {
      photos = photos.filter(p => p.id !== id);
      savePhotos();
      renderCalendar();
    }

    function renderEventList() {
      const monthEvents = events
        .filter(e => {
          const d = new Date(e.date + "T00:00:00");
          return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
        })
        .sort((a, b) => a.date.localeCompare(b.date));

      if (monthEvents.length === 0) {
        eventListEl.innerHTML = `<p class="empty">이번 달 입력 일정이 아직 없습니다.</p>`;
        return;
      }

      eventListEl.innerHTML = monthEvents.map(e => `
        <div class="event-item">
          <strong>${e.title}</strong>
          <div class="event-meta">${e.date} · ${typeLabel[e.type]}</div>
          ${e.memo ? `<div class="event-meta">${e.memo}</div>` : ""}
          <button class="delete-btn" onclick="deleteEvent(${e.id})">삭제</button>
        </div>
      `).join("");
    }

    function renderPhotoList() {
      const monthPhotos = photos
        .filter(p => {
          const d = new Date(p.date + "T00:00:00");
          return d.getFullYear() === currentYear && d.getMonth() === currentMonth;
        })
        .sort((a, b) => b.date.localeCompare(a.date));

      if (monthPhotos.length === 0) {
        photoListEl.innerHTML = `<p class="empty">이번 달 사진이 아직 없습니다.<br>추억 사진을 올리면 달력 칸에 썸네일로 표시됩니다.</p>`;
        return;
      }

      photoListEl.innerHTML = monthPhotos.map(p => `
        <div class="photo-item">
          <strong>${p.date}</strong>
          <div class="event-meta">${p.caption || "사진 메모 없음"}</div>
          <div class="memory-gallery">
            <img src="${p.image}" alt="추억 사진">
          </div>
          <button class="delete-btn" onclick="deletePhoto(${p.id})">사진 삭제</button>
        </div>
      `).join("");
    }

    function openDayDetail(dateKey) {
      const dayEvents = events.filter(e => e.date === dateKey);
      const dayPhotos = photos.filter(p => p.date === dateKey);
      const modal = document.getElementById("dayModal");
      const title = document.getElementById("modalTitle");
      const body = document.getElementById("modalBody");

      title.textContent = `${dateKey}의 기록`;

      const eventHtml = dayEvents.length
        ? dayEvents.map(e => `
          <div class="event-item">
            <strong>${typeEmoji[e.type]} ${e.title}</strong>
            <div class="event-meta">${typeLabel[e.type]}</div>
            ${e.memo ? `<div class="event-meta">${e.memo}</div>` : ""}
          </div>
        `).join("")
        : `<p class="empty">이날 입력된 일정이 없습니다.</p>`;

      const photoHtml = dayPhotos.length
        ? `<div class="modal-gallery">` + dayPhotos.map(p => `
          <div class="modal-photo">
            <img src="${p.image}" alt="추억 사진">
            <div>${p.caption || "사진 메모 없음"}</div>
          </div>
        `).join("") + `</div>`
        : `<p class="empty">이날 등록된 사진이 없습니다.</p>`;

      body.innerHTML = `
        <h4>📌 일정</h4>
        ${eventHtml}
        <h4>📷 사진</h4>
        ${photoHtml}
      `;

      modal.classList.add("open");
    }

    function closeModal() {
      document.getElementById("dayModal").classList.remove("open");
    }

    function moveMonth(amount) {
      currentMonth += amount;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      renderCalendar();
    }

    function goToday() {
      const today = new Date();
      currentYear = today.getFullYear();
      currentMonth = today.getMonth();
      renderCalendar();
    }

    function setDefaultDate() {
      const today = toDateKey(new Date());
      document.getElementById("eventDate").value = today;
      document.getElementById("photoDate").value = today;
    }

    setDefaultDate();
    renderCalendar();
  </script>
</body>
</html>
